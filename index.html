<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>W Properties — Operations Dashboard</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f8f8f6;color:#1a1a1a;font-size:14px;}
.dash{padding:1.5rem;max-width:1400px;margin:0 auto;}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;flex-wrap:wrap;gap:8px;}
.topbar-title{font-size:22px;font-weight:600;color:#1a1a1a;}
.topbar-sub{font-size:13px;color:#666;margin-top:2px;}
.refresh-btn{font-size:12px;padding:6px 14px;cursor:pointer;border-radius:8px;border:1px solid #ddd;background:#fff;color:#555;}
.refresh-btn:hover{background:#f0f0ee;}
.main-nav{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:1.5rem;border-bottom:2px solid #e5e5e0;}
.mnav{padding:8px 18px;font-size:14px;cursor:pointer;border:none;background:none;color:#888;border-bottom:3px solid transparent;margin-bottom:-2px;font-weight:500;transition:color .15s;}
.mnav:hover{color:#1a1a1a;}
.mnav.active{color:#1D9E75;border-bottom-color:#1D9E75;}
.loc-tabs{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:1.5rem;border-bottom:1px solid #e5e5e0;}
.ltab{padding:7px 16px;font-size:13px;cursor:pointer;border:none;background:none;color:#888;border-bottom:2px solid transparent;margin-bottom:-1px;transition:color .15s;}
.ltab:hover{color:#1a1a1a;}
.ltab.active{color:#1D9E75;border-bottom-color:#1D9E75;font-weight:600;}
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:1.5rem;}
.mc{background:#fff;border-radius:10px;padding:16px;border:1px solid #eee;}
.mc-label{font-size:11px;color:#888;margin-bottom:8px;text-transform:uppercase;letter-spacing:.04em;}
.mc-val{font-size:28px;font-weight:600;line-height:1;}
.mc-val.green{color:#0F6E56;}.mc-val.red{color:#A32D2D;}.mc-val.amber{color:#854F0B;}.mc-val.blue{color:#185FA5;}
.mc-sub{font-size:11px;color:#999;margin-top:5px;}
.card{background:#fff;border:1px solid #eee;border-radius:12px;padding:1.25rem;margin-bottom:1rem;}
.card-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.card-title{font-size:14px;font-weight:600;color:#1a1a1a;}
.section-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1.5rem;}
.stab{padding:6px 14px;border-radius:20px;font-size:12px;cursor:pointer;border:1px solid #ddd;background:#fff;color:#888;transition:all .15s;}
.stab:hover{background:#f5f5f3;}
.stab.active{background:#1D9E75;color:#fff;border-color:#1D9E75;font-weight:600;}
.tbl-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:13px;}
th{text-align:left;padding:9px 12px;font-size:11px;font-weight:600;color:#999;border-bottom:1px solid #eee;white-space:nowrap;text-transform:uppercase;letter-spacing:.04em;}
td{padding:9px 12px;border-bottom:1px solid #f0f0ee;color:#1a1a1a;vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:#fafaf8;}
.badge{display:inline-block;font-size:10px;padding:2px 9px;border-radius:10px;font-weight:600;white-space:nowrap;}
.b-green{background:#E1F5EE;color:#085041;}.b-red{background:#FCEBEB;color:#791F1F;}
.b-amber{background:#FAEEDA;color:#633806;}.b-blue{background:#E6F1FB;color:#0C447C;}
.b-purple{background:#EEEDFE;color:#3C3489;}.b-coral{background:#FAECE7;color:#712B13;}
.b-pink{background:#FBEAF0;color:#72243E;}.b-gray{background:#f0f0ee;color:#666;}
.alert-row td{background:#FFFBF0;}
.loading{padding:3rem;text-align:center;font-size:13px;color:#999;}
.spinner{display:inline-block;width:18px;height:18px;border:2px solid #ddd;border-top-color:#1D9E75;border-radius:50%;animation:spin .7s linear infinite;margin-right:8px;vertical-align:middle;}
@keyframes spin{to{transform:rotate(360deg);}}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:1rem;}
@media(max-width:700px){.two-col{grid-template-columns:1fr;}.dash{padding:1rem;}}
.empty{font-size:13px;color:#bbb;padding:14px 0;text-align:center;}
.loc-dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:4px;vertical-align:middle;}
.person-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1.25rem;}
.ptab{padding:6px 14px;border-radius:20px;font-size:12px;cursor:pointer;border:1px solid #ddd;background:#fff;color:#888;transition:all .15s;}
.ptab:hover{background:#f5f5f3;}
.ptab.active{background:#1D9E75;color:#fff;border-color:#1D9E75;font-weight:600;}
.cnt-pill{background:rgba(255,255,255,0.3);border-radius:10px;padding:1px 6px;font-size:10px;margin-left:3px;}
.cnt-pill-inactive{background:#f0f0ee;border-radius:10px;padding:1px 6px;font-size:10px;margin-left:3px;color:#888;}
.task-row{display:flex;align-items:flex-start;gap:10px;padding:11px 0;border-bottom:1px solid #f0f0ee;}
.task-row:last-child{border-bottom:none;}
.task-check{width:18px;height:18px;border:1.5px solid #ccc;border-radius:4px;cursor:pointer;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.task-check:hover{border-color:#1D9E75;}
.task-check.done{background:#1D9E75;border-color:#1D9E75;}
.task-check.done::after{content:'';width:9px;height:5px;border-left:2px solid #fff;border-bottom:2px solid #fff;transform:rotate(-45deg) translateY(-1px);display:block;}
.task-check.inprog{background:#EF9F27;border-color:#EF9F27;}
.task-check.inprog::after{content:'';width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,0.8);display:block;}
.task-body{flex:1;min-width:0;}
.task-title{font-size:13px;color:#1a1a1a;line-height:1.4;}
.task-title.done{text-decoration:line-through;color:#bbb;}
.task-meta{font-size:11px;color:#999;margin-top:4px;display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.task-del{font-size:20px;color:#ddd;cursor:pointer;border:none;background:none;padding:0 4px;line-height:1;flex-shrink:0;transition:color .15s;}
.task-del:hover{color:#A32D2D;}
.priority-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:5px;}
.p-high{background:#E24B4A;}.p-medium{background:#EF9F27;}.p-low{background:#1D9E75;}
.add-task-form{margin-top:16px;padding-top:16px;border-top:1px solid #f0f0ee;display:flex;flex-wrap:wrap;gap:8px;}
.add-task-form input,.add-task-form select{font-size:13px;padding:8px 10px;border:1px solid #ddd;border-radius:8px;background:#fff;color:#1a1a1a;outline:none;}
.add-task-form input:focus,.add-task-form select:focus{border-color:#1D9E75;}
.add-task-form input[type=text]{flex:1;min-width:180px;}
.add-task-form input[type=date]{flex:0 0 auto;}
.add-task-form select{flex:0 0 auto;}
.add-btn{padding:8px 18px;background:#1D9E75;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;font-weight:500;flex-shrink:0;transition:background .15s;}
.add-btn:hover{background:#0F6E56;}
.add-btn:disabled{background:#ccc;cursor:not-allowed;}
.toast{position:fixed;bottom:24px;right:24px;background:#1a1a1a;color:#fff;padding:10px 18px;border-radius:8px;font-size:13px;font-weight:500;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999;}
.toast.show{opacity:1;}

.proj-card{background:#fff;border:1px solid #eee;border-radius:12px;padding:1.25rem;margin-bottom:1rem;cursor:pointer;transition:border-color .15s;}
.proj-card:hover{border-color:#1D9E75;}
.proj-card.active-proj{border:2px solid #1D9E75;}
.proj-header{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:12px;}
.proj-name{font-size:15px;font-weight:600;color:#1a1a1a;}
.proj-meta{font-size:12px;color:#999;margin-top:3px;}
.progress-bar{height:6px;background:#f0f0ee;border-radius:3px;margin:10px 0 4px;overflow:hidden;}
.progress-fill{height:100%;background:#1D9E75;border-radius:3px;transition:width .3s;}
.progress-label{font-size:11px;color:#999;}
.proj-actions{display:flex;gap:6px;flex-shrink:0;}
.proj-btn{padding:5px 12px;font-size:11px;border-radius:6px;cursor:pointer;border:1px solid #ddd;background:#fff;color:#666;transition:all .15s;}
.proj-btn:hover{background:#f5f5f3;}
.proj-btn.danger{border-color:#f7c1c1;color:#A32D2D;}
.proj-btn.danger:hover{background:#FCEBEB;}
.proj-btn.primary{background:#1D9E75;color:#fff;border-color:#1D9E75;}
.proj-btn.primary:hover{background:#0F6E56;}
.new-proj-form{background:#f8f8f6;border-radius:10px;padding:1.25rem;margin-bottom:1rem;border:1px dashed #ddd;}
.new-proj-form input,.new-proj-form select,.new-proj-form textarea{font-size:13px;padding:8px 10px;border:1px solid #ddd;border-radius:8px;background:#fff;color:#1a1a1a;width:100%;margin-bottom:8px;outline:none;}
.new-proj-form input:focus,.new-proj-form select:focus,.new-proj-form textarea:focus{border-color:#1D9E75;}
.new-proj-form textarea{height:70px;resize:vertical;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
@media(max-width:600px){.form-row{grid-template-columns:1fr;}}
.proj-detail{background:#f8f8f6;border-radius:10px;padding:1.25rem;margin-bottom:1rem;}
.proj-detail-header{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
.back-btn{font-size:12px;color:#1D9E75;cursor:pointer;border:none;background:none;padding:0;}
.back-btn:hover{text-decoration:underline;}
.archive-bar{display:flex;align-items:center;justify-content:space-between;background:#f8f8f6;border-radius:8px;padding:10px 14px;margin-bottom:1rem;flex-wrap:wrap;gap:8px;}
.archive-bar span{font-size:13px;color:#888;}
.b-notstarted{background:#f0f0ee;color:#666;}
.b-inprogress{background:#E6F1FB;color:#0C447C;}
.b-onhold{background:#FAEEDA;color:#633806;}
.b-complete{background:#E1F5EE;color:#085041;}
</style>
</head>
<body>
<div class="dash">
  <div class="topbar">
    <div>
      <div class="topbar-title">W Properties — Operations Dashboard</div>
      <div class="topbar-sub" id="last-updated">Loading...</div>
    </div>
    <button class="refresh-btn" onclick="refreshAll()">&#8635; Refresh</button>
  </div>
  <div class="main-nav">
    <button class="mnav active" onclick="switchMain('properties')">Properties</button>
    <button class="mnav" onclick="switchMain('tasks')">Tasks</button>
    <button class="mnav" onclick="switchMain('projects')">Projects</button>
  </div>
  <div id="properties-section">
    <div class="loc-tabs" id="loc-tabs"></div>
    <div id="dashboard-body"><div class="loading"><span class="spinner"></span>Loading property data...</div></div>
  </div>
  <div id="tasks-section" style="display:none;">
    <div id="tasks-body"><div class="loading"><span class="spinner"></span>Loading tasks...</div></div>
  </div>
  <div id="projects-section" style="display:none;">
    <div id="projects-body"><div class="loading"><span class="spinner"></span>Loading projects...</div></div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
const TASKS_API='https://script.google.com/macros/s/AKfycbwb6d9fB0lyiHRCdnzIxt37QgA0-Wwme6KewPIkf1wFJlg2F4R_6-I5IIMwYezRbOdVVg/exec';
const LOCATIONS=[
  {name:'Magnolia Woods',url:'https://docs.google.com/spreadsheets/d/e/2PACX-1vT4YmIGGk9tvdLQ_N0IQ8s-47WZLPWnaaldw2q3JnZ0W9KgET8zjPugSV9JGQH3sZPImcX6cKyQb8Y_/pub?gid=0&single=true&output=csv',manager:'Angela',color:'b-green',dot:'#1D9E75'},
  {name:'Walden',url:'https://docs.google.com/spreadsheets/d/e/2PACX-1vT4YmIGGk9tvdLQ_N0IQ8s-47WZLPWnaaldw2q3JnZ0W9KgET8zjPugSV9JGQH3sZPImcX6cKyQb8Y_/pub?gid=1157477898&single=true&output=csv',manager:'Crystal',color:'b-blue',dot:'#378ADD'},
  {name:'Office Park',url:'https://docs.google.com/spreadsheets/d/e/2PACX-1vT4YmIGGk9tvdLQ_N0IQ8s-47WZLPWnaaldw2q3JnZ0W9KgET8zjPugSV9JGQH3sZPImcX6cKyQb8Y_/pub?gid=1002033801&single=true&output=csv',manager:'Johnna',color:'b-purple',dot:'#7F77DD'},
  {name:'Blue Heron Bay',url:'https://docs.google.com/spreadsheets/d/e/2PACX-1vT4YmIGGk9tvdLQ_N0IQ8s-47WZLPWnaaldw2q3JnZ0W9KgET8zjPugSV9JGQH3sZPImcX6cKyQb8Y_/pub?gid=1785197572&single=true&output=csv',manager:'Johnna',color:'b-coral',dot:'#D85A30'},
  {name:'South Lake Conroe',url:'https://docs.google.com/spreadsheets/d/e/2PACX-1vT4YmIGGk9tvdLQ_N0IQ8s-47WZLPWnaaldw2q3JnZ0W9KgET8zjPugSV9JGQH3sZPImcX6cKyQb8Y_/pub?gid=1238510324&single=true&output=csv',manager:'Crystal',color:'b-pink',dot:'#D4537E'},
];
const TEAM=['General','James','Johnna','Crystal','Angela','Chris','Christine'];
let allData={},activeLoc='All Locations',activePropSec='overview',activeMain='properties',activePerson='General',allTasks=[],allProjects=[],activeProjectId=null,showNewProjForm=false;

function switchMain(s){
  activeMain=s;
  document.querySelectorAll('.mnav').forEach(b=>b.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('properties-section').style.display=s==='properties'?'block':'none';
  document.getElementById('tasks-section').style.display=s==='tasks'?'block':'none';
  document.getElementById('projects-section').style.display=s==='projects'?'block':'none';
  if(s==='tasks')renderTasks();
  if(s==='projects')loadProjects();
}

function refreshAll(){loadPropertyData();if(activeMain==='tasks')loadTasks();if(activeMain==='projects')loadProjects();}

function parseCSV(text){
  const lines=text.trim().split('\n');
  if(lines.length<2)return[];
  const headers=lines[0].split(',').map(h=>h.replace(/^"|"$/g,'').trim());
  return lines.slice(1).map(line=>{
    const vals=[];let cur='',inQ=false;
    for(let i=0;i<line.length;i++){
      if(line[i]==='"'){inQ=!inQ;}else if(line[i]===','&&!inQ){vals.push(cur.trim());cur='';}else cur+=line[i];
    }
    vals.push(cur.trim());
    const obj={};headers.forEach((h,i)=>obj[h]=vals[i]||'');return obj;
  }).filter(r=>Object.values(r).some(v=>v));
}

async function loadPropertyData(){
  document.getElementById('last-updated').textContent='Loading...';
  await Promise.all(LOCATIONS.map(async loc=>{
    try{const res=await fetch(loc.url,{mode:'cors'});allData[loc.name]=parseCSV(await res.text());}
    catch(e){try{const r2=await fetch('https://corsproxy.io/?'+encodeURIComponent(loc.url));allData[loc.name]=parseCSV(await r2.text());}catch(e2){allData[loc.name]=null;}}
  }));
  document.getElementById('last-updated').textContent='Last updated: '+new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'})+' · '+new Date().toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric',year:'numeric'});
  renderLocTabs();renderProperties();
}

function renderLocTabs(){
  document.getElementById('loc-tabs').innerHTML=['All Locations',...LOCATIONS.map(l=>l.name)].map(t=>{
    const l=LOCATIONS.find(x=>x.name===t);
    return`<button class="ltab ${t===activeLoc?'active':''}" onclick="switchLoc('${t}')">${l?`<span class="loc-dot" style="background:${l.dot};"></span>`:''} ${t}</button>`;
  }).join('');
}

function switchLoc(n){activeLoc=n;activePropSec='overview';renderLocTabs();renderProperties();}
function switchPropSec(s){activePropSec=s;renderProperties();}

function getLocData(){
  if(activeLoc==='All Locations'){let c=[];LOCATIONS.forEach(l=>{if(allData[l.name])allData[l.name].forEach(r=>c.push({...r,_location:l.name}));});return c;}
  return(allData[activeLoc]||[]).map(r=>({...r,_location:activeLoc}));
}

function daysUntil(ds){if(!ds)return null;const d=new Date(ds);if(isNaN(d))return null;return Math.ceil((d-new Date())/86400000);}
function fmtDate(ds){if(!ds)return'—';const d=new Date(ds);if(isNaN(d))return ds;return d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});}
function statusBadge(s){if(!s)return'<span class="badge b-gray">—</span>';const sl=s.toLowerCase();if(sl==='rented')return'<span class="badge b-green">Rented</span>';if(sl==='vacant')return'<span class="badge b-red">Vacant</span>';if(sl.includes('notice'))return'<span class="badge b-amber">Notice given</span>';return'<span class="badge b-gray">'+s+'</span>';}
function expiryBadge(ds){const d=daysUntil(ds);if(d===null)return'<span class="badge b-gray">—</span>';if(d<0)return'<span class="badge b-red">Expired</span>';if(d<=30)return'<span class="badge b-red">'+d+'d</span>';if(d<=60)return'<span class="badge b-amber">'+d+'d</span>';return'<span class="badge b-green">'+d+'d</span>';}
function locBadge(n){const l=LOCATIONS.find(x=>x.name===n);return`<span class="badge ${l?l.color:'b-gray'}"><span class="loc-dot" style="background:${l?l.dot:'#999'};"></span>${n}</span>`;}

function renderProperties(){
  const data=getLocData();
  const body=document.getElementById('dashboard-body');
  if(!data.length){body.innerHTML='<div class="loading">No data. Try refreshing.</div>';return;}
  const rented=data.filter(r=>(r['Status']||'').toLowerCase()==='rented');
  const vacant=data.filter(r=>(r['Status']||'').toLowerCase()==='vacant');
  const notice=data.filter(r=>(r['Status']||'').toLowerCase().includes('notice'));
  const total=data.length,occRate=total?Math.round((rented.length/total)*100):0;
  const today=new Date(),in90=new Date(today.getTime()+90*86400000);
  const renewalsSoon=data.filter(r=>{const d=new Date(r['Agreement Expiration']);return!isNaN(d)&&d>=today&&d<=in90;});
  const insAlert=data.filter(r=>{const d=daysUntil(r['Insurance Expiration']);return d!==null&&d>=0&&d<=60;});
  const moveouts=data.filter(r=>{const d=daysUntil(r['Move out Date']);return d!==null&&d>=0&&d<=60;});
  const showLoc=activeLoc==='All Locations';
  const secs=['overview','units','renewals','insurance','moveouts'];
  const secL={overview:'Overview',units:'All units',renewals:`Renewals (${renewalsSoon.length})`,insurance:`Insurance (${insAlert.length})`,moveouts:`Move-outs (${moveouts.length})`};
  let html=`<div class="section-tabs">`+secs.map(s=>`<button class="stab ${s===activePropSec?'active':''}" onclick="switchPropSec('${s}')">${secL[s]}</button>`).join('')+`</div>`;

  if(activePropSec==='overview'){
    html+=`<div class="metrics">
      <div class="mc"><div class="mc-label">Occupancy rate</div><div class="mc-val green">${occRate}%</div><div class="mc-sub">${rented.length} of ${total} units</div></div>
      <div class="mc"><div class="mc-label">Vacant</div><div class="mc-val red">${vacant.length}</div><div class="mc-sub">available now</div></div>
      <div class="mc"><div class="mc-label">Notice given</div><div class="mc-val amber">${notice.length}</div><div class="mc-sub">vacating soon</div></div>
      <div class="mc"><div class="mc-label">Renewals due</div><div class="mc-val amber">${renewalsSoon.length}</div><div class="mc-sub">within 90 days</div></div>
      <div class="mc"><div class="mc-label">Insurance alerts</div><div class="mc-val ${insAlert.length>0?'red':'green'}">${insAlert.length}</div><div class="mc-sub">expiring ≤60 days</div></div>
      <div class="mc"><div class="mc-label">Move-outs</div><div class="mc-val blue">${moveouts.length}</div><div class="mc-sub">next 60 days</div></div>
    </div>`;
    if(showLoc){
      html+=`<div class="card"><div class="card-hdr"><div class="card-title">Occupancy by location</div></div><div class="tbl-wrap"><table><thead><tr><th>Location</th><th>Manager</th><th>Total</th><th>Rented</th><th>Vacant</th><th>Notice</th><th>Rate</th></tr></thead><tbody>`;
      LOCATIONS.forEach(l=>{const d=allData[l.name]||[];const r2=d.filter(r=>(r['Status']||'').toLowerCase()==='rented').length;const v2=d.filter(r=>(r['Status']||'').toLowerCase()==='vacant').length;const n2=d.filter(r=>(r['Status']||'').toLowerCase().includes('notice')).length;const rate2=d.length?Math.round((r2/d.length)*100):0;html+=`<tr><td>${locBadge(l.name)}</td><td style="color:#888;">${l.manager}</td><td>${allData[l.name]===null?'<span style="color:#A32D2D;">Error</span>':d.length}</td><td><span class="badge b-green">${r2}</span></td><td><span class="badge b-red">${v2}</span></td><td><span class="badge b-amber">${n2}</span></td><td><strong>${rate2}%</strong></td></tr>`;});
      html+=`</tbody></table></div></div>`;
    }
    html+=`<div class="two-col">`;
    html+=`<div class="card"><div class="card-hdr"><div class="card-title">Upcoming renewals</div></div>`;
    if(!renewalsSoon.length)html+='<div class="empty">No renewals in next 90 days</div>';

// ── TASKS ─────────────────────────────────────────────────
async function loadTasks(){
  document.getElementById('tasks-body').innerHTML='<div class="loading"><span class="spinner"></span>Loading tasks...</div>';
  try{
    const res=await fetch(TASKS_API+'?action=getTasks',{mode:'cors'});
    const data=await res.json();
    allTasks=data.tasks||[];
  }catch(e){allTasks=[];}
  renderTasks();
}

function renderTasks(){
  const body=document.getElementById('tasks-body');
  const tasks=activePerson==='All'?allTasks:allTasks.filter(t=>t['Assignee']===activePerson);
  const open=tasks.filter(t=>t['Status']==='Open').length;
  const inprog=tasks.filter(t=>t['Status']==='In Progress').length;
  const done=tasks.filter(t=>t['Status']==='Done').length;

  let html=`<div class="metrics" style="grid-template-columns:repeat(4,1fr);">
    <div class="mc"><div class="mc-label">Open</div><div class="mc-val red">${allTasks.filter(t=>t['Status']==='Open').length}</div><div class="mc-sub">all team</div></div>
    <div class="mc"><div class="mc-label">In progress</div><div class="mc-val amber">${allTasks.filter(t=>t['Status']==='In Progress').length}</div><div class="mc-sub">all team</div></div>
    <div class="mc"><div class="mc-label">Done</div><div class="mc-val green">${allTasks.filter(t=>t['Status']==='Done').length}</div><div class="mc-sub">all team</div></div>
    <div class="mc"><div class="mc-label">Total tasks</div><div class="mc-val">${allTasks.length}</div><div class="mc-sub">all team</div></div>
  </div>`;

  html+=`<div class="person-tabs">`;
  TEAM.forEach(p=>{
    const cnt=allTasks.filter(t=>t['Assignee']===p&&t['Status']!=='Done').length;
    html+=`<button class="ptab ${p===activePerson?'active':''}" onclick="switchPerson('${p}')">${p}${cnt>0?`<span class="${p===activePerson?'cnt-pill':'cnt-pill-inactive'}">${cnt}</span>`:''}</button>`;
  });
  html+=`</div>`;

  html+=`<div class="card"><div class="card-hdr"><div class="card-title">${activePerson === 'General' ? 'General — Company Tasks' : activePerson + ' — Tasks'}</div><span style="font-size:12px;color:#999;">${open} open · ${inprog} in progress · ${done} done</span></div>`;

  const sorted=[...tasks].sort((a,b)=>{
    const s={Open:0,'In Progress':1,Done:2};
    const p={High:0,Medium:1,Low:2};
    return(s[a['Status']]||0)-(s[b['Status']]||0)||(p[a['Priority']]||1)-(p[b['Priority']]||1);
  });

  if(!sorted.length){
    html+=`<div class="empty">No tasks for ${activePerson}. Add one below.</div>`;
  } else {
    sorted.forEach(t=>{
      const isDone=t['Status']==='Done';
      const isInProg=t['Status']==='In Progress';
      const due=t['Due Date']?'Due '+fmtDate(t['Due Date']):'';
      html+=`<div class="task-row">
        <div class="priority-dot p-${(t['Priority']||'Medium').toLowerCase()}"></div>
        <div class="task-check ${isDone?'done':isInProg?'inprog':''}" onclick="cycleStatus('${t['Task ID'].replace(/'/g,"\\'")}')"></div>
        <div class="task-body">
          <div class="task-title ${isDone?'done':''}">${t['Title']||'Untitled'}</div>
          <div class="task-meta">
            ${due?`<span>${due}</span>`:''}
            ${t['Location']?`<span>${t['Location']}</span>`:''}
            <span class="badge ${isDone?'b-green':isInProg?'b-amber':'b-red'}">${t['Status']}</span>
            <span class="badge b-gray">${t['Priority']||'Medium'}</span>
          </div>
        </div>
        <button class="task-del" onclick="deleteTask('${t['Task ID'].replace(/'/g,"\\'")}')">×</button>
      </div>`;
    });
  }

  html+=`<div class="add-task-form">
    <input type="text" id="new-task-title" placeholder="Add a task for ${activePerson}..." onkeydown="if(event.key==='Enter')submitTask()">
    <select id="new-task-priority"><option value="High">High</option><option value="Medium" selected>Medium</option><option value="Low">Low</option></select>
    <input type="date" id="new-task-due">
    <select id="new-task-location">
      <option value="">No location</option>
      ${LOCATIONS.map(l=>`<option value="${l.name}">${l.name}</option>`).join('')}
    </select>
    <button class="add-btn" id="add-task-btn" onclick="submitTask()">+ Add task</button>
  </div></div>`;

  body.innerHTML=html;
}

function switchPerson(p){activePerson=p;renderTasks();}

async function submitTask(){
  const title=document.getElementById('new-task-title').value.trim();
  if(!title)return;
  const btn=document.getElementById('add-task-btn');
  btn.disabled=true;btn.textContent='Adding...';
  try{
    const res=await fetch(TASKS_API,{method:'POST',mode:'cors',headers:{'Content-Type':'text/plain'},
      body:JSON.stringify({action:'addTask',Title:title,Assignee:activePerson,
        Priority:document.getElementById('new-task-priority').value,
        'Due Date':document.getElementById('new-task-due').value,
        Location:document.getElementById('new-task-location').value,
        Source:'Dashboard',Status:'Open'})});
    const data=await res.json();
    if(data.success){showToast('Task added');await loadTasks();}
    else showToast('Error: '+( data.error||'Unknown'));
  }catch(e){showToast('Could not connect to tasks API');}
  btn.disabled=false;btn.textContent='+ Add task';
}

async function cycleStatus(id){
  const t=allTasks.find(x=>x['Task ID']===id);
  if(!t)return;
  const cycle={Open:'In Progress','In Progress':'Done',Done:'Open'};
  const ns=cycle[t['Status']]||'Open';
  t['Status']=ns;
  if(activeProjectId){
    const proj=allProjects.find(p=>p['Project ID']===activeProjectId);
    if(proj){
      proj['Completed Count']=allTasks.filter(t=>t['Project ID']===activeProjectId&&t['Status']==='Done').length;
      proj['Progress']=proj['Task Count']>0?Math.round((proj['Completed Count']/proj['Task Count'])*100):0;
    }
    renderProjectDetail(activeProjectId);
  } else {
    renderTasks();
  }
  try{
    await fetch(TASKS_API,{method:'POST',mode:'cors',headers:{'Content-Type':'text/plain'},
      body:JSON.stringify({action:'updateTask','Task ID':id,Status:ns})});
    showToast('Status → '+ns);
  }catch(e){showToast('Error saving status');}
}

async function deleteTask(id){
  if(!confirm('Delete this task?'))return;
  allTasks=allTasks.filter(t=>t['Task ID']!==id);
  if(activeProjectId){
    const proj=allProjects.find(p=>p['Project ID']===activeProjectId);
    if(proj){
      proj['Task Count']=allTasks.filter(t=>t['Project ID']===activeProjectId).length;
      proj['Completed Count']=allTasks.filter(t=>t['Project ID']===activeProjectId&&t['Status']==='Done').length;
      proj['Progress']=proj['Task Count']>0?Math.round((proj['Completed Count']/proj['Task Count'])*100):0;
    }
    renderProjectDetail(activeProjectId);
  } else {
    renderTasks();
  }
  try{
    await fetch(TASKS_API,{method:'POST',mode:'cors',headers:{'Content-Type':'text/plain'},
      body:JSON.stringify({action:'deleteTask','Task ID':id})});
    showToast('Task deleted');
  }catch(e){showToast('Error deleting task');}
}


// ── PROJECTS ──────────────────────────────────────────────
async function loadProjects(){
  document.getElementById('projects-body').innerHTML='<div class="loading"><span class="spinner"></span>Loading projects...</div>';
  try{
    const [pr,tr]=await Promise.all([
      fetch(TASKS_API+'?action=getProjects',{mode:'cors'}).then(r=>r.json()),
      fetch(TASKS_API+'?action=getTasks',{mode:'cors'}).then(r=>r.json())
    ]);
    allProjects=pr.projects||[];
    allTasks=tr.tasks||[];
  }catch(e){allProjects=[];}
  renderProjects();
}

function renderProjects(){
  const body=document.getElementById('projects-body');
  if(activeProjectId)return renderProjectDetail(activeProjectId);

  const statusColor={'Not Started':'b-notstarted','In Progress':'b-inprogress','On Hold':'b-onhold','Complete':'b-complete'};
  const doneTasks=allTasks.filter(t=>t['Status']=='Done').length;

  let html=`<div class="archive-bar">
    <span>${allTasks.filter(t=>t['Status']=='Done').length} completed tasks ready to archive</span>
    <div style="display:flex;gap:8px;">
      <button class="proj-btn" onclick="archiveDoneTasks()">Archive all done tasks</button>
      <button class="proj-btn primary" onclick="toggleNewProjForm()">+ New project</button>
    </div>
  </div>`;

  if(showNewProjForm){
    html+=`<div class="new-proj-form">
      <div style="font-size:13px;font-weight:600;margin-bottom:10px;color:#1a1a1a;">New project</div>
      <input type="text" id="pj-name" placeholder="Project name *">
      <textarea id="pj-desc" placeholder="Description (optional)"></textarea>
      <div class="form-row">
        <select id="pj-status"><option value="Not Started">Not Started</option><option value="In Progress">In Progress</option><option value="On Hold">On Hold</option><option value="Complete">Complete</option></select>
        <select id="pj-location"><option value="">Company-wide</option>${LOCATIONS.map(l=>`<option value="${l.name}">${l.name}</option>`).join('')}</select>
      </div>
      <div class="form-row">
        <input type="date" id="pj-due" placeholder="Due date">
        <div style="display:flex;gap:8px;align-items:center;">
          <button class="add-btn" style="flex:1;" onclick="submitProject()">Create project</button>
          <button class="proj-btn" onclick="toggleNewProjForm()">Cancel</button>
        </div>
      </div>
    </div>`;
  }

  if(!allProjects.length){
    html+='<div class="empty" style="padding:3rem 0;">No projects yet. Create your first project above.</div>';
  } else {
    const active=allProjects.filter(p=>p['Status']!=='Complete');
    const complete=allProjects.filter(p=>p['Status']=='Complete');
    if(active.length){
      html+='<div style="font-size:11px;font-weight:600;color:#999;text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px;">Active projects</div>';
      html+=active.map(p=>projCard(p,statusColor)).join('');
    }
    if(complete.length){
      html+='<div style="font-size:11px;font-weight:600;color:#999;text-transform:uppercase;letter-spacing:.05em;margin:16px 0 10px;">Completed projects</div>';
      html+=complete.map(p=>projCard(p,statusColor)).join('');
    }
  }
  body.innerHTML=html;
}

function projCard(p,statusColor){
  const pct=parseInt(p['Progress'])||0;
  const loc=p['Location']?`<span class="badge b-blue" style="font-size:10px;">${p['Location']}</span>`:'<span class="badge b-gray" style="font-size:10px;">Company-wide</span>';
  const due=p['Due Date']?` · Due ${fmtDate(p['Due Date'])}`:''
  return`<div class="proj-card" onclick="openProject('${p['Project ID']}')">
    <div class="proj-header">
      <div>
        <div class="proj-name">${p['Name']}</div>
        <div class="proj-meta">${loc}${due}</div>
      </div>
      <div style="display:flex;gap:6px;align-items:center;" onclick="event.stopPropagation()">
        <span class="badge ${statusColor[p['Status']]||'b-gray'}">${p['Status']}</span>
        <button class="proj-btn danger" onclick="archiveProject('${p['Project ID']}','${p['Name'].replace(/'/g,"\\'")}')">Archive</button>
      </div>
    </div>
    ${p['Description']?`<div style="font-size:12px;color:#888;margin-bottom:8px;">${p['Description']}</div>`:''}
    <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
    <div class="progress-label">${pct}% complete · ${p['Completed Count']} of ${p['Task Count']} tasks done</div>
  </div>`;
}

function openProject(id){activeProjectId=id;renderProjects();}
function closeProject(){activeProjectId=null;renderProjects();}

function renderProjectDetail(projectId){

  const proj=allProjects.find(p=>p['Project ID']===projectId);

  const statusColor={'Not Started':'b-notstarted','In Progress':'b-inprogress','On Hold':'b-onhold','Complete':'b-complete'};

  let html=`<div style="display:flex;align-items:center;gap:10px;margin-bottom:1.25rem;">
    <button class="back-btn" onclick="closeProject()">← All projects</button>
    <span style="color:#ddd;">|</span>
    <span style="font-size:14px;font-weight:600;">${proj['Name']}</span>
    <span class="badge ${statusColor[proj['Status']]||'b-gray'}">${proj['Status']}</span>

  html+=`<div class="card">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:10px;margin-bottom:14px;">
      <div>
        ${proj['Location']?`<span class="badge b-blue">${proj['Location']}</span>`:'<span class="badge b-gray">Company-wide</span>'}
        ${proj['Due Date']?`<span style="font-size:12px;color:#999;margin-left:8px;">Due ${fmtDate(proj['Due Date'])}</span>`:''}
      </div>
      <select onchange="updateProjectStatus('${projectId}',this.value)" style="font-size:12px;padding:5px 8px;border:1px solid #ddd;border-radius:6px;background:#fff;">
        ${['Not Started','In Progress','On Hold','Complete'].map(s=>`<option value="${s}" ${s===proj['Status']?'selected':''} >${s}</option>`).join('')}
      </select>
    </div>
    ${proj['Description']?`<p style="font-size:13px;color:#666;margin-bottom:14px;">${proj['Description']}</p>`:''}
    <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
    <div class="progress-label" style="margin-bottom:0;">${pct}% complete · ${proj['Completed Count']} of ${proj['Task Count']} tasks done</div>
  </div>`;

  // Task list
  const sorted=[...projTasks].sort((a,b)=>{const s={Open:0,'In Progress':1,Done:2};const p={High:0,Medium:1,Low:2};return(s[a['Status']]||0)-(s[b['Status']]||0)||(p[a['Priority']]||1)-(p[b['Priority']]||1);});
  html+=`<div class="card"><div class="card-hdr"><div class="card-title">Project tasks</div><span style="font-size:12px;color:#999;">${projTasks.filter(t=>t['Status']==='Open').length} open · ${projTasks.filter(t=>t['Status']=='Done').length} done</span></div>`;
  if(!sorted.length)html+='<div class="empty">No tasks yet. Add the first one below.</div>';
  sorted.forEach(t=>{

      <div class="task-check ${isDone?'done':isInProg?'inprog':''}" onclick="cycleStatus('${t['Task ID'].replace(/'/g,"\\'")}')"></div>
      <div class="task-body">
        <div class="task-title ${isDone?'done':''}">${t['Title']||'Untitled'}</div>
        <div class="task-meta">
          <span class="badge b-gray" style="font-size:10px;">${t['Assignee']}</span>
          ${t['Due Date']?`<span>Due ${fmtDate(t['Due Date'])}</span>`:''}
          <span class="badge ${isDone?'b-green':isInProg?'b-amber':'b-red'}">${t['Status']}</span>

        </div>
      </div>
      <button class="task-del" onclick="deleteTask('${t['Task ID'].replace(/'/g,"\\'")}')">×</button>
    </div>`;
  });
  html+=`<div class="add-task-form">
    <input type="text" id="pj-task-title" placeholder="Add a task to this project..." onkeydown="if(event.key==='Enter')submitProjectTask()">

    <input type="date" id="pj-task-due">

function toggleNewProjForm(){showNewProjForm=!showNewProjForm;renderProjects();}

async function submitProject(){
  const name=document.getElementById('pj-name').value.trim();
  if(!name){showToast('Project name required');return;}
  try{
    const res=await fetch(TASKS_API,{method:'POST',mode:'cors',headers:{'Content-Type':'text/plain'},
      body:JSON.stringify({action:'addProject',Name:name,
        Description:document.getElementById('pj-desc').value,
        Status:document.getElementById('pj-status').value,
        Location:document.getElementById('pj-location').value,
        'Due Date':document.getElementById('pj-due').value})});
    const data=await res.json();
    if(data.success){showToast('Project created');showNewProjForm=false;await loadProjects();}
  }catch(e){showToast('Error creating project');}
}

let submittingProjectTask=false;
async function submitProjectTask(){
  if(submittingProjectTask)return;
  const titleEl=document.getElementById('pj-task-title');
  const title=titleEl.value.trim();
  if(!title)return;
  submittingProjectTask=true;
  const btn=document.querySelector('#projects-body .add-btn');
  if(btn){btn.disabled=true;btn.textContent='Adding...';}
  const proj=allProjects.find(p=>p['Project ID']===activeProjectId);
  try{
    const res=await fetch(TASKS_API,{method:'POST',mode:'cors',headers:{'Content-Type':'text/plain'},
      body:JSON.stringify({action:'addTask',Title:title,
        Assignee:document.getElementById('pj-task-assignee').value,
        Priority:document.getElementById('pj-task-priority').value,
        'Due Date':document.getElementById('pj-task-due').value,
        Location:proj?proj['Location']:'',
        Source:'Project',Status:'Open',
        'Project ID':activeProjectId})});
    const data=await res.json();
    if(data.success){titleEl.value='';showToast('Task added');await loadProjects();}
    else showToast('Error: '+(data.error||'Unknown'));
  }catch(e){showToast('Error adding task');}
  submittingProjectTask=false;
  if(btn){btn.disabled=false;btn.textContent='+ Add task';}
}

async function updateProjectStatus(id,status){
  try{
    await fetch(TASKS_API,{method:'POST',mode:'cors',headers:{'Content-Type':'text/plain'},
      body:JSON.stringify({action:'updateProject','Project ID':id,Status:status})});
    const proj=allProjects.find(p=>p['Project ID']===id);
    if(proj)proj['Status']=status;
    showToast('Status updated');
    renderProjects();
  }catch(e){showToast('Error updating project');}
}

async function archiveProject(id,name){
  if(!confirm(`Archive project "${name}" and all its tasks?`))return;
  try{
    const res=await fetch(TASKS_API,{method:'POST',mode:'cors',headers:{'Content-Type':'text/plain'},
      body:JSON.stringify({action:'archiveProject','Project ID':id})});
    const data=await res.json();
    if(data.success){showToast(`Project archived (${data.tasksArchived} tasks)`);await loadProjects();}
  }catch(e){showToast('Error archiving project');}
}

async function archiveDoneTasks(){
  const count=allTasks.filter(t=>t['Status']=='Done').length;
  if(!count){showToast('No done tasks to archive');return;}
  if(!confirm(`Archive all ${count} completed tasks across the whole team?`))return;
  try{
    const res=await fetch(TASKS_API,{method:'POST',mode:'cors',headers:{'Content-Type':'text/plain'},
      body:JSON.stringify({action:'archiveDoneTasks'})});
    const data=await res.json();
    if(data.success){showToast(`${data.archived} tasks archived`);await loadTasks();if(activeMain==='projects')await loadProjects();}
  }catch(e){showToast('Error archiving tasks');}
}

function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}

loadPropertyData();
