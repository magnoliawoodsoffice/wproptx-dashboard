<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>W Properties — Operations Dashboard</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f8f8f6;color:#1a1a1a;font-size:14px;}
.dash{padding:1.5rem;max-width:1400px;margin:0 auto;}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;flex-wrap:wrap;gap:8px;}
.topbar-title{font-size:22px;font-weight:600;color:#1a1a1a;}
.topbar-sub{font-size:13px;color:#666;margin-top:2px;}
.refresh-btn{font-size:12px;padding:6px 14px;cursor:pointer;border-radius:8px;border:1px solid #ddd;background:#fff;color:#555;}
.refresh-btn:hover{background:#f0f0ee;}
.loc-tabs{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:1.5rem;border-bottom:1px solid #e5e5e0;}
.ltab{padding:7px 16px;font-size:13px;cursor:pointer;border:none;background:none;color:#888;border-bottom:2px solid transparent;margin-bottom:-1px;transition:color .15s;}
.ltab:hover{color:#1a1a1a;}
.ltab.active{color:#1D9E75;border-bottom-color:#1D9E75;font-weight:600;}
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:1.5rem;}
.mc{background:#fff;border-radius:10px;padding:16px;border:1px solid #eee;}
.mc-label{font-size:11px;color:#888;margin-bottom:8px;text-transform:uppercase;letter-spacing:.04em;}
.mc-val{font-size:28px;font-weight:600;line-height:1;}
.mc-val.green{color:#0F6E56;}.mc-val.red{color:#A32D2D;}.mc-val.amber{color:#854F0B;}.mc-val.blue{color:#185FA5;}
.mc-sub{font-size:11px;color:#999;margin-top:5px;}
.card{background:#fff;border:1px solid #eee;border-radius:12px;padding:1.25rem;margin-bottom:1rem;}
.card-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.card-title{font-size:14px;font-weight:600;color:#1a1a1a;}
.section-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1.5rem;}
.stab{padding:6px 14px;border-radius:20px;font-size:12px;cursor:pointer;border:1px solid #ddd;background:#fff;color:#888;transition:all .15s;}
.stab:hover{background:#f5f5f3;}
.stab.active{background:#1D9E75;color:#fff;border-color:#1D9E75;font-weight:600;}
.tbl-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:13px;}
th{text-align:left;padding:9px 12px;font-size:11px;font-weight:600;color:#999;border-bottom:1px solid #eee;white-space:nowrap;text-transform:uppercase;letter-spacing:.04em;}
td{padding:9px 12px;border-bottom:1px solid #f0f0ee;color:#1a1a1a;vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:#fafaf8;}
.badge{display:inline-block;font-size:10px;padding:2px 9px;border-radius:10px;font-weight:600;white-space:nowrap;}
.b-green{background:#E1F5EE;color:#085041;}
.b-red{background:#FCEBEB;color:#791F1F;}
.b-amber{background:#FAEEDA;color:#633806;}
.b-blue{background:#E6F1FB;color:#0C447C;}
.b-purple{background:#EEEDFE;color:#3C3489;}
.b-coral{background:#FAECE7;color:#712B13;}
.b-pink{background:#FBEAF0;color:#72243E;}
.b-gray{background:#f0f0ee;color:#666;}
.alert-row td{background:#FFFBF0;}
.loading{padding:3rem;text-align:center;font-size:13px;color:#999;}
.spinner{display:inline-block;width:18px;height:18px;border:2px solid #ddd;border-top-color:#1D9E75;border-radius:50%;animation:spin .7s linear infinite;margin-right:8px;vertical-align:middle;}
@keyframes spin{to{transform:rotate(360deg);}}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:1rem;}
@media(max-width:700px){.two-col{grid-template-columns:1fr;}.dash{padding:1rem;}}
.empty{font-size:13px;color:#bbb;padding:14px 0;text-align:center;}
.err-msg{padding:12px 16px;background:#FCEBEB;border-radius:8px;font-size:13px;color:#791F1F;margin-bottom:1rem;}
.loc-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:5px;}
</style>
</head>
<body>
<div class="dash">
  <div class="topbar">
    <div>
      <div class="topbar-title">W Properties — Operations Dashboard</div>
      <div class="topbar-sub" id="last-updated">Loading live data...</div>
    </div>
    <button class="refresh-btn" onclick="loadAll()">&#8635; Refresh</button>
  </div>
  <div class="loc-tabs" id="loc-tabs"></div>
  <div id="dashboard-body"><div class="loading"><span class="spinner"></span>Fetching live data from Google Sheets...</div></div>
</div>

<script>
const LOCATIONS=[
  {name:'Magnolia Woods',url:'https://docs.google.com/spreadsheets/d/e/2PACX-1vT4YmIGGk9tvdLQ_N0IQ8s-47WZLPWnaaldw2q3JnZ0W9KgET8zjPugSV9JGQH3sZPImcX6cKyQb8Y_/pub?gid=0&single=true&output=csv',manager:'Johnna',color:'b-green',dot:'#1D9E75'},
  {name:'Walden',url:'https://docs.google.com/spreadsheets/d/e/2PACX-1vT4YmIGGk9tvdLQ_N0IQ8s-47WZLPWnaaldw2q3JnZ0W9KgET8zjPugSV9JGQH3sZPImcX6cKyQb8Y_/pub?gid=1157477898&single=true&output=csv',manager:'Crystal',color:'b-blue',dot:'#378ADD'},
  {name:'Office Park',url:'https://docs.google.com/spreadsheets/d/e/2PACX-1vT4YmIGGk9tvdLQ_N0IQ8s-47WZLPWnaaldw2q3JnZ0W9KgET8zjPugSV9JGQH3sZPImcX6cKyQb8Y_/pub?gid=1002033801&single=true&output=csv',manager:'James',color:'b-purple',dot:'#7F77DD'},
  {name:'Blue Heron Bay',url:'https://docs.google.com/spreadsheets/d/e/2PACX-1vT4YmIGGk9tvdLQ_N0IQ8s-47WZLPWnaaldw2q3JnZ0W9KgET8zjPugSV9JGQH3sZPImcX6cKyQb8Y_/pub?gid=1785197572&single=true&output=csv',manager:'Angela',color:'b-coral',dot:'#D85A30'},
  {name:'South Lake Conroe',url:'https://docs.google.com/spreadsheets/d/e/2PACX-1vT4YmIGGk9tvdLQ_N0IQ8s-47WZLPWnaaldw2q3JnZ0W9KgET8zjPugSV9JGQH3sZPImcX6cKyQb8Y_/pub?gid=1238510324&single=true&output=csv',manager:'Chris',color:'b-pink',dot:'#D4537E'},
];

const PROXY='https://api.allorigins.win/raw?url=';
let allData={};
let activeLocation='All Locations';
let activeSection='overview';

function parseCSV(text){
  const lines=text.trim().split('\n');
  if(lines.length<2)return[];
  const headers=lines[0].split(',').map(h=>h.replace(/^"|"$/g,'').trim());
  return lines.slice(1).map(line=>{
    const vals=[];let cur='',inQ=false;
    for(let i=0;i<line.length;i++){
      if(line[i]==='"'){inQ=!inQ;}
      else if(line[i]===','&&!inQ){vals.push(cur.trim());cur='';}
      else cur+=line[i];
    }
    vals.push(cur.trim());
    const obj={};
    headers.forEach((h,i)=>obj[h]=vals[i]||'');
    return obj;
  }).filter(r=>Object.values(r).some(v=>v));
}

function daysUntil(ds){
  if(!ds)return null;
  const d=new Date(ds);
  if(isNaN(d))return null;
  return Math.ceil((d-new Date())/86400000);
}

function fmtDate(ds){
  if(!ds)return'—';
  const d=new Date(ds);
  if(isNaN(d))return ds;
  return d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
}

function statusBadge(s){
  if(!s)return'<span class="badge b-gray">—</span>';
  const sl=s.toLowerCase();
  if(sl==='rented')return'<span class="badge b-green">Rented</span>';
  if(sl==='vacant')return'<span class="badge b-red">Vacant</span>';
  if(sl.includes('notice'))return'<span class="badge b-amber">Notice given</span>';
  return'<span class="badge b-gray">'+s+'</span>';
}

function expiryBadge(ds){
  const d=daysUntil(ds);
  if(d===null)return'<span class="badge b-gray">—</span>';
  if(d<0)return'<span class="badge b-red">Expired</span>';
  if(d<=30)return'<span class="badge b-red">'+d+'d</span>';
  if(d<=60)return'<span class="badge b-amber">'+d+'d</span>';
  return'<span class="badge b-green">'+d+'d</span>';
}

function locBadge(n){
  const l=LOCATIONS.find(x=>x.name===n);
  return`<span class="badge ${l?l.color:'b-gray'}"><span class="loc-dot" style="background:${l?l.dot:'#999'};"></span>${n}</span>`;
}

async function loadAll(){
  document.getElementById('last-updated').textContent='Loading...';
  document.getElementById('dashboard-body').innerHTML='<div class="loading"><span class="spinner"></span>Fetching live data...</div>';
  await Promise.all(LOCATIONS.map(async loc=>{
    try{
      const res=await fetch(PROXY+encodeURIComponent(loc.url));
      const text=await res.text();
      allData[loc.name]=parseCSV(text);
    }catch(e){allData[loc.name]=null;}
  }));
  document.getElementById('last-updated').textContent=
    'Last updated: '+new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'})+
    ' · '+new Date().toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric',year:'numeric'});
  renderTabs();
  renderDashboard();
}

function renderTabs(){
  const el=document.getElementById('loc-tabs');
  el.innerHTML=['All Locations',...LOCATIONS.map(l=>l.name)].map(t=>{
    const loc=LOCATIONS.find(x=>x.name===t);
    return`<button class="ltab ${t===activeLocation?'active':''}" onclick="switchLoc('${t}')">${loc?`<span class="loc-dot" style="background:${loc.dot};display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:4px;vertical-align:middle;"></span>`:''}${t}</button>`;
  }).join('');
}

function switchLoc(n){activeLocation=n;activeSection='overview';renderTabs();renderDashboard();}
function switchSection(s){activeSection=s;renderDashboard();}

function getActiveData(){
  if(activeLocation==='All Locations'){
    let c=[];
    LOCATIONS.forEach(l=>{if(allData[l.name])allData[l.name].forEach(r=>c.push({...r,_location:l.name}));});
    return c;
  }
  return(allData[activeLocation]||[]).map(r=>({...r,_location:activeLocation}));
}

function renderDashboard(){
  const data=getActiveData();
  const body=document.getElementById('dashboard-body');
  if(!data.length){body.innerHTML='<div class="loading">No data loaded. Try refreshing.</div>';return;}

  const rented=data.filter(r=>(r['Status']||'').toLowerCase()==='rented');
  const vacant=data.filter(r=>(r['Status']||'').toLowerCase()==='vacant');
  const notice=data.filter(r=>(r['Status']||'').toLowerCase().includes('notice'));
  const total=data.length;
  const occRate=total?Math.round((rented.length/total)*100):0;
  const today=new Date();
  const in90=new Date(today.getTime()+90*86400000);
  const renewalsSoon=data.filter(r=>{const d=new Date(r['Agreement Expiration']);return!isNaN(d)&&d>=today&&d<=in90;});
  const insAlert=data.filter(r=>{const d=daysUntil(r['Insurance Expiration']);return d!==null&&d>=0&&d<=60;});
  const moveouts=data.filter(r=>{const d=daysUntil(r['Move out Date']);return d!==null&&d>=0&&d<=60;});
  const showLoc=activeLocation==='All Locations';

  const sections=['overview','units','renewals','insurance','moveouts'];
  const secLabels={overview:'Overview',units:'All units',renewals:`Renewals (${renewalsSoon.length})`,insurance:`Insurance alerts (${insAlert.length})`,moveouts:`Move-outs (${moveouts.length})`};

  let html=`<div class="section-tabs">`+sections.map(s=>`<button class="stab ${s===activeSection?'active':''}" onclick="switchSection('${s}')">${secLabels[s]}</button>`).join('')+`</div>`;

  if(activeSection==='overview'){
    html+=`<div class="metrics">
      <div class="mc"><div class="mc-label">Occupancy rate</div><div class="mc-val green">${occRate}%</div><div class="mc-sub">${rented.length} of ${total} units</div></div>
      <div class="mc"><div class="mc-label">Vacant</div><div class="mc-val red">${vacant.length}</div><div class="mc-sub">available now</div></div>
      <div class="mc"><div class="mc-label">Notice given</div><div class="mc-val amber">${notice.length}</div><div class="mc-sub">vacating soon</div></div>
      <div class="mc"><div class="mc-label">Renewals due</div><div class="mc-val amber">${renewalsSoon.length}</div><div class="mc-sub">within 90 days</div></div>
      <div class="mc"><div class="mc-label">Insurance alerts</div><div class="mc-val ${insAlert.length>0?'red':'green'}">${insAlert.length}</div><div class="mc-sub">expiring ≤60 days</div></div>
      <div class="mc"><div class="mc-label">Move-outs</div><div class="mc-val blue">${moveouts.length}</div><div class="mc-sub">next 60 days</div></div>
    </div>`;

    if(showLoc){
      html+=`<div class="card"><div class="card-hdr"><div class="card-title">Occupancy by location</div></div>
      <div class="tbl-wrap"><table><thead><tr><th>Location</th><th>Manager</th><th>Total</th><th>Rented</th><th>Vacant</th><th>Notice</th><th>Rate</th></tr></thead><tbody>`;
      LOCATIONS.forEach(l=>{
        const d=allData[l.name]||[];
        const r2=d.filter(r=>(r['Status']||'').toLowerCase()==='rented').length;
        const v2=d.filter(r=>(r['Status']||'').toLowerCase()==='vacant').length;
        const n2=d.filter(r=>(r['Status']||'').toLowerCase().includes('notice')).length;
        const rate2=d.length?Math.round((r2/d.length)*100):0;
        html+=`<tr><td>${locBadge(l.name)}</td><td style="color:#888;">${l.manager}</td>
          <td>${allData[l.name]===null?'<span style="color:#A32D2D;">Load error</span>':d.length}</td>
          <td><span class="badge b-green">${r2}</span></td><td><span class="badge b-red">${v2}</span></td>
          <td><span class="badge b-amber">${n2}</span></td><td><strong>${rate2}%</strong></td></tr>`;
      });
      html+=`</tbody></table></div></div>`;
    }

    html+=`<div class="two-col">`;
    html+=`<div class="card"><div class="card-hdr"><div class="card-title">Upcoming renewals</div></div>`;
    if(!renewalsSoon.length)html+='<div class="empty">No renewals in next 90 days</div>';
    else html+=`<div class="tbl-wrap"><table><thead><tr><th>Unit</th><th>Tenant</th>${showLoc?'<th>Location</th>':''}<th>Expires</th><th>Days</th></tr></thead><tbody>`+
      renewalsSoon.sort((a,b)=>new Date(a['Agreement Expiration'])-new Date(b['Agreement Expiration'])).slice(0,8).map(r=>
        `<tr><td>${r['Unit']||'—'}</td><td>${r['Tenant']||'—'}</td>${showLoc?`<td>${locBadge(r._location)}</td>`:''}<td>${fmtDate(r['Agreement Expiration'])}</td><td>${expiryBadge(r['Agreement Expiration'])}</td></tr>`
      ).join('')+`</tbody></table></div>`;
    html+=`</div>`;

    html+=`<div class="card"><div class="card-hdr"><div class="card-title">Insurance expiring soon</div></div>`;
    if(!insAlert.length)html+='<div class="empty">No insurance alerts</div>';
    else html+=`<div class="tbl-wrap"><table><thead><tr><th>Unit</th><th>Tenant</th>${showLoc?'<th>Location</th>':''}<th>Expires</th><th>Days</th></tr></thead><tbody>`+
      insAlert.sort((a,b)=>new Date(a['Insurance Expiration'])-new Date(b['Insurance Expiration'])).slice(0,8).map(r=>
        `<tr><td>${r['Unit']||'—'}</td><td>${r['Tenant']||'—'}</td>${showLoc?`<td>${locBadge(r._location)}</td>`:''}<td>${fmtDate(r['Insurance Expiration'])}</td><td>${expiryBadge(r['Insurance Expiration'])}</td></tr>`
      ).join('')+`</tbody></table></div>`;
    html+=`</div></div>`;

    if(vacant.length)
      html+=`<div class="card"><div class="card-hdr"><div class="card-title">Vacant units</div></div>
      <div class="tbl-wrap"><table><thead><tr><th>Unit</th>${showLoc?'<th>Location</th>':''}<th>Size</th><th>Asking price</th></tr></thead><tbody>`+
        vacant.map(r=>`<tr><td>${r['Unit']||'—'}</td>${showLoc?`<td>${locBadge(r._location)}</td>`:''}<td>${r['Size']||'—'}</td><td>${r['Asking Price']||'—'}</td></tr>`).join('')+
        `</tbody></table></div></div>`;
  }

  if(activeSection==='units'){
    html+=`<div class="card"><div class="card-hdr"><div class="card-title">All units${showLoc?' — all locations':' — '+activeLocation}</div><span style="font-size:12px;color:#999;">${total} total</span></div>
    <div class="tbl-wrap"><table><thead><tr><th>Unit</th>${showLoc?'<th>Location</th>':''}<th>Status</th><th>Tenant</th><th>Size</th><th>Asking price</th><th>Agreement exp.</th><th>Insurance exp.</th><th>Move-out</th></tr></thead><tbody>`+
      data.map(r=>{
        const d=daysUntil(r['Agreement Expiration']);
        return`<tr class="${d!==null&&d<=30?'alert-row':''}">
          <td>${r['Unit']||'—'}</td>${showLoc?`<td>${locBadge(r._location)}</td>`:''}
          <td>${statusBadge(r['Status'])}</td><td>${r['Tenant']||'—'}</td>
          <td>${r['Size']||'—'}</td><td>${r['Asking Price']||'—'}</td>
          <td>${fmtDate(r['Agreement Expiration'])}${d!==null&&d<=60?' '+expiryBadge(r['Agreement Expiration']):''}</td>
          <td>${fmtDate(r['Insurance Expiration'])}${daysUntil(r['Insurance Expiration'])!==null&&daysUntil(r['Insurance Expiration'])<=60?' '+expiryBadge(r['Insurance Expiration']):''}</td>
          <td>${fmtDate(r['Move out Date'])}</td></tr>`;
      }).join('')+`</tbody></table></div></div>`;
  }

  if(activeSection==='renewals'){
    const all=data.filter(r=>r['Agreement Expiration']).sort((a,b)=>new Date(a['Agreement Expiration'])-new Date(b['Agreement Expiration']));
    html+=`<div class="card"><div class="card-hdr"><div class="card-title">Lease renewals</div></div>
    <div class="tbl-wrap"><table><thead><tr><th>Unit</th>${showLoc?'<th>Location</th>':''}<th>Tenant</th><th>Status</th><th>Agreement exp.</th><th>Days</th><th>Expiration status</th><th>Membership exp.</th></tr></thead><tbody>`+
      all.map(r=>{
        const d=daysUntil(r['Agreement Expiration']);
        return`<tr class="${d!==null&&d<=60?'alert-row':''}">
          <td>${r['Unit']||'—'}</td>${showLoc?`<td>${locBadge(r._location)}</td>`:''}
          <td>${r['Tenant']||'—'}</td><td>${statusBadge(r['Status'])}</td>
          <td>${fmtDate(r['Agreement Expiration'])}</td><td>${expiryBadge(r['Agreement Expiration'])}</td>
          <td>${r['Expiration Status']||'—'}</td><td>${fmtDate(r['Membership Expiration'])}</td></tr>`;
      }).join('')+`</tbody></table></div></div>`;
  }

  if(activeSection==='insurance'){
    const all=data.filter(r=>r['Insurance Expiration']).sort((a,b)=>new Date(a['Insurance Expiration'])-new Date(b['Insurance Expiration']));
    html+=`<div class="card"><div class="card-hdr"><div class="card-title">Insurance tracker</div></div>
    <div class="tbl-wrap"><table><thead><tr><th>Unit</th>${showLoc?'<th>Location</th>':''}<th>Tenant</th><th>Status</th><th>Insurance exp.</th><th>Days</th><th>Insurance status</th></tr></thead><tbody>`+
      all.map(r=>{
        const d=daysUntil(r['Insurance Expiration']);
        return`<tr class="${d!==null&&d<=60?'alert-row':''}">
          <td>${r['Unit']||'—'}</td>${showLoc?`<td>${locBadge(r._location)}</td>`:''}
          <td>${r['Tenant']||'—'}</td><td>${statusBadge(r['Status'])}</td>
          <td>${fmtDate(r['Insurance Expiration'])}</td><td>${expiryBadge(r['Insurance Expiration'])}</td>
          <td>${r['Insurance Status']||'—'}</td></tr>`;
      }).join('')+`</tbody></table></div></div>`;
  }

  if(activeSection==='moveouts'){
    const all=data.filter(r=>r['Move out Date']).sort((a,b)=>new Date(a['Move out Date'])-new Date(b['Move out Date']));
    html+=`<div class="card"><div class="card-hdr"><div class="card-title">Move-out schedule</div></div>
    <div class="tbl-wrap"><table><thead><tr><th>Unit</th>${showLoc?'<th>Location</th>':''}<th>Tenant</th><th>Status</th><th>Move-out date</th><th>Days</th><th>Size</th><th>Asking price</th></tr></thead><tbody>`+
      all.map(r=>{
        const d=daysUntil(r['Move out Date']);
        return`<tr class="${d!==null&&d<=14?'alert-row':''}">
          <td>${r['Unit']||'—'}</td>${showLoc?`<td>${locBadge(r._location)}</td>`:''}
          <td>${r['Tenant']||'—'}</td><td>${statusBadge(r['Status'])}</td>
          <td>${fmtDate(r['Move out Date'])}</td><td>${expiryBadge(r['Move out Date'])}</td>
          <td>${r['Size']||'—'}</td><td>${r['Asking Price']||'—'}</td></tr>`;
      }).join('')+`</tbody></table></div></div>`;
  }

  body.innerHTML=html;
}

loadAll();
</script>
</body>
</html>
